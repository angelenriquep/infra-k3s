# Pre-commit hooks for code quality
# Install with: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [ "--allow-multiple-documents" ]
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.32.0
    hooks:
      - id: yamllint
        args: [ -c=.yamllint.yaml ]

  - repo: local
    hooks:
      - id: manifests-validate
        name: Validate Kubernetes manifests
        entry: bash
        language: script
        files: "^(manifests|argocd)/.*\\.ya?ml$"
        args:
          - -c
          - |
            echo "🔍 Validating YAML manifests..."
            python - <<'PY'
            import pathlib
            import yaml

            paths = list(pathlib.Path('manifests').rglob('*.yaml')) + list(pathlib.Path('argocd').rglob('*.yaml'))
            for p in paths:
                with open(p, 'r', encoding='utf-8') as f:
                    list(yaml.safe_load_all(f))
            print(f"✅ YAML validation passed ({len(paths)} files)")
            PY

      - id: check-frontend-files
        name: Check frontend files syntax
        entry: bash
        language: script
        files: "^api-gateway/base/frontend/.*"
        args:
          - -c
          - |
            echo "🔍 Checking frontend files..."
            # Check HTML syntax (basic)
            if [[ -f "api-gateway/base/frontend/index.html" ]]; then
              if ! grep -q "</html>" "api-gateway/base/frontend/index.html"; then
                echo "❌ HTML file seems incomplete"
                exit 1
              fi
            fi
            # Check nginx config syntax (basic)
            if [[ -f "api-gateway/base/frontend/nginx.conf" ]]; then
              if ! grep -q "server {" "api-gateway/base/frontend/nginx.conf"; then
                echo "❌ Nginx config seems incomplete"
                exit 1
              fi
            fi
            echo "✅ Frontend files check passed"
