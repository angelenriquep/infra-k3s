apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: backend-api
spec:
    parentRefs:
        - name: eg
          sectionName: https
    hostnames:
        - "api.homelab.local"
    rules:
        - backendRefs:
              # Argo Rollouts manages the weights automatically during canary
              - group: ""
                kind: Service
                name: backend
                port: 3000
                weight: 100
              - group: ""
                kind: Service
                name: backend-canary
                port: 3000
                weight: 0
          matches:
              - path:
                    type: PathPrefix
                    value: /
---
# Redirect HTTP to HTTPS
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: http-to-https-redirect
spec:
    parentRefs:
        - name: eg
          sectionName: http
    hostnames:
        - "api.homelab.local"
    rules:
        - filters:
              - type: RequestRedirect
                requestRedirect:
                    scheme: https
                    statusCode: 301
