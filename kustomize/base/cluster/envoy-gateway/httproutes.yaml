apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: backend-hostname
spec:
    parentRefs:
        - name: eg
    hostnames:
        - "www.example.com"
    rules:
        - backendRefs:
              - group: ""
                kind: Service
                name: backend
                port: 3000
                weight: 1
          matches:
              - path:
                    type: PathPrefix
                    value: /api/
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: backend-simple
spec:
    parentRefs:
        - name: eg
    rules:
        - backendRefs:
              - group: ""
                kind: Service
                name: backend
                port: 3000
                weight: 1
          matches:
              - path:
                    type: PathPrefix
                    value: /
