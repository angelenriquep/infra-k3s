---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: migration-target
  namespace: default
spec:
  instances: 1

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "128MB"
      effective_cache_size: "512MB"
      max_replication_slots: "10"
      max_wal_senders: "10"
      max_logical_replication_workers: "4"
      shared_preload_libraries: ""

  storage:
    size: 1Gi
    storageClass: local-path

  backup:
    barmanObjectStore:
      destinationPath: s3://postgresql-backups/
      endpointURL: http://minio.minio.svc.cluster.local:9000
      s3Credentials:
        accessKeyId:
          name: minio-backup-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: minio-backup-credentials
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 2
    retentionPolicy: "30d"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 500Mi
