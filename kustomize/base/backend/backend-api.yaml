---
# ServiceAccount for backend
apiVersion: v1
kind: ServiceAccount
metadata:
    name: backend
    namespace: default
    labels:
        app: backend
---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
    name: backend
    namespace: default
    labels:
        app: backend
spec:
    replicas: 1
    selector:
        matchLabels:
            app: backend
    template:
        metadata:
            labels:
                app: backend
        spec:
            serviceAccountName: backend
            containers:
                - name: backend
                  image: mockingbird2912/api-gateway-backend:v2.0.0
                  imagePullPolicy: Always
                  ports:
                      - containerPort: 3000
                        protocol: TCP
                  env:
                      - name: PORT
                        value: "3000"
                      - name: ENVIRONMENT
                        value: "kubernetes"
                  resources:
                      requests:
                          cpu: 50m
                          memory: 64Mi
                      limits:
                          cpu: 200m
                          memory: 256Mi
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 3000
                      initialDelaySeconds: 10
                      periodSeconds: 10
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 3000
                      initialDelaySeconds: 5
                      periodSeconds: 5
---
# Backend Service - NodePort for direct access
apiVersion: v1
kind: Service
metadata:
    name: backend
    namespace: default
    labels:
        app: backend
spec:
    selector:
        app: backend
    ports:
        - name: http
          port: 3000
          targetPort: 3000
    type: ClusterIP
