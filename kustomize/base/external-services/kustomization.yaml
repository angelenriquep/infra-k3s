apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Resources that connect to externally-managed pods
# These resources should NOT have commonLabels applied
# to prevent service selector mismatches
resources:
  - ../cluster/envoy-gateway/nodeport-gateway.yaml

# Add annotations for tracking and management
commonAnnotations:
  managed-by: kustomize
  category: external-service
  description: "Services connecting to external pods (no commonLabels)"
