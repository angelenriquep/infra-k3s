apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference base configuration
resources:
    - ../../base
    # Envoy Gateway (cluster-level resources)
    - ../../base/cluster/envoy-gateway
    # cert-manager CA and certificates
    - ../../base/cluster/cert-manager

# Development patches
patches:
    - path: replica-patch.yaml
    - path: resource-patch.yaml

# Development-specific ConfigMaps
configMapGenerator:
    - name: app-config
      literals:
          - ENVIRONMENT=development
          - DEBUG=true
          - LOG_LEVEL=debug
