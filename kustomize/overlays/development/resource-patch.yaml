# Development: Lower resource requirements
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
    name: backend
spec:
    template:
        spec:
            containers:
                - name: backend
                  resources:
                      requests:
                          cpu: 10m
                          memory: 32Mi
                      limits:
                          cpu: 100m
                          memory: 128Mi
