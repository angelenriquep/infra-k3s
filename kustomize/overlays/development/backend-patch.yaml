apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: backend
          env:
            - name: DB_HOST
              value: "migration-target-rw.default.svc.cluster.local"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cnpg-app-credentials
                  key: password
