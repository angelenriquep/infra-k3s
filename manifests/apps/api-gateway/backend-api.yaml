---
# ServiceAccount for backend
apiVersion: v1
kind: ServiceAccount
metadata:
    name: backend
    namespace: default
    labels:
        app: backend
---
# Backend Rollout (Argo Rollouts - Canary strategy)
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
    name: backend
    namespace: default
    labels:
        app: backend
spec:
    replicas: 1
    revisionHistoryLimit: 3
    selector:
        matchLabels:
            app: backend
    strategy:
        canary:
            canaryService: backend-canary
            stableService: backend
            steps:
                - setWeight: 20
                - pause: { duration: 30s }
                - setWeight: 50
                - pause: { duration: 30s }
                - setWeight: 100
            trafficRouting:
                plugins:
                    argoproj-labs/gatewayAPI:
                        httpRoute: backend-api
                        namespace: default
    template:
        metadata:
            labels:
                app: backend
        spec:
            serviceAccountName: backend
            containers:
                - name: backend
                  image: mockingbird2912/api-gateway-backend:v2.0.0
                  imagePullPolicy: Always
                  ports:
                      - containerPort: 3000
                        protocol: TCP
                  env:
                      - name: PORT
                        value: "3000"
                      - name: ENVIRONMENT
                        value: "kubernetes"
                  resources:
                      requests:
                          cpu: 10m
                          memory: 32Mi
                      limits:
                          cpu: 100m
                          memory: 128Mi
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 3000
                      initialDelaySeconds: 10
                      periodSeconds: 10
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 3000
                      initialDelaySeconds: 5
                      periodSeconds: 5
---
# Stable Service - receives production traffic
apiVersion: v1
kind: Service
metadata:
    name: backend
    namespace: default
    labels:
        app: backend
spec:
    selector:
        app: backend
    ports:
        - name: http
          port: 3000
          targetPort: 3000
    type: ClusterIP
---
# Canary Service - receives canary traffic during rollout
apiVersion: v1
kind: Service
metadata:
    name: backend-canary
    namespace: default
    labels:
        app: backend
        role: canary
spec:
    selector:
        app: backend
    ports:
        - name: http
          port: 3000
          targetPort: 3000
    type: ClusterIP
